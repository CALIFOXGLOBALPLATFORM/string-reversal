<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Reversal Tool</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 12px;
            margin: 0;
            background-color: #ffffff;
            color: #333333;
        }
        main {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        h1 {
            font-size: 16px;
            margin: 0 0 5px 0;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .primary-btn {
            width: 100%;
            padding: 8px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .primary-btn:hover {
            background-color: #357ae8;
        }
        .result-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #f5f5f5;
            padding: 8px;
            border-radius: 4px;
            margin-top: 5px;
            display: none;
        }
        #resultText {
            font-size: 14px;
            word-break: break-all;
            font-weight: 500;
            margin: 0;
            padding-right: 10px;
        }
        .copy-btn {
            background-color: #34a853;
            color: white;
            border: none;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            white-space: nowrap;
        }
        .copy-btn:hover {
            background-color: #2b8c44;
        }
        .error {
            color: #d9534f;
            font-size: 13px;
            margin: 5px 0;
        }
        footer {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #eeeeee;
            font-size: 12px;
        }
        footer a {
            color: #4285f4;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <h1>String Reversal Tool</h1>
        
        <!-- Input section -->
        <input type="text" id="inputString" placeholder="Enter text here..." aria-label="Enter a string to reverse" />
        <button id="reverseBtn" class="primary-btn">Reverse Text</button>
        
        <!-- Output container with copy option -->
        <div id="resultBox" class="result-container">
            <p id="resultText" aria-live="polite"></p>
            <button id="copyBtn" class="copy-btn">Copy</button>
        </div>
        
        <p id="errorMessage" class="error" aria-live="assertive"></p>
        
        <!-- Contact links and GitHub Reference -->
        <footer>
            <p>Developer Profile: <a href="https://github.com/CALIFOXGLOBALPLATFORM" target="_blank" rel="noopener">CALIFOXGLOBALPLATFORM</a></p>
            <p>Need help? Contact on <a href="https://t.me" target="_blank" rel="noopener">Telegram</a> or <a href="https://wa.me" target="_blank" rel="noopener">WhatsApp</a>.</p>
        </footer>
    </main>

    <script>
        let reversedTextValue = "";

        // Reverse logic
        document.getElementById('reverseBtn').addEventListener('click', function() {
            const inputField = document.getElementById('inputString');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');
            const errorDisplay = document.getElementById('errorMessage');
            const copyBtn = document.getElementById('copyBtn');
            
            errorDisplay.innerText = '';
            resultBox.style.display = 'none';
            copyBtn.innerText = 'Copy'; 

            const textValue = inputField.value.trim();

            if (textValue.length === 0) {
                errorDisplay.innerText = 'Please enter text to reverse.';
            } else {
                reversedTextValue = textValue.split('').reverse().join('');
                resultText.innerText = reversedTextValue;
                resultBox.style.display = 'flex'; 
            }
        });

        // Clipboard logic
        document.getElementById('copyBtn').addEventListener('click', function() {
            if (!reversedTextValue) return;

            navigator.clipboard.writeText(reversedTextValue).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.innerText = 'Copied!';
                setTimeout(() => {
                    copyBtn.innerText = 'Copy';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        });
    </script>
</body>
</html>
